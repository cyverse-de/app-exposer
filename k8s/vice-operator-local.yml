---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vice-operator-local
  namespace: vice-apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vice-operator-local
  template:
    metadata:
      labels:
        app: vice-operator-local
    spec:
      serviceAccountName: vice-operator
      tolerations:
        - key: "gpu"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
        - key: "analysis"
          operator: "Exists"
      containers:
        - name: vice-operator
          image: harbor.cyverse.org/de/app-exposer:qa
          imagePullPolicy: Always
          command: ["/vice-operator"]
          args:
            - "--namespace=vice-apps"
            - "--port=10000"
            - "--routing-type=tailscale"
            - "--ingress-class=tailscale"
            - "--max-analyses=5"
            - "--gpu-vendor=amd"
            - "--vice-base-url=https://intdrv.himalayan-frog.ts.net"
            # WARNING: Replace registry-password with actual credentials before
            # applying. Using "REPLACE_ME" will cause image pull failures.
            - "--registry-server=harbor.cyverse.org"
            - "--registry-username=robot$vice"
            - "--registry-password=REPLACE_ME"
            - "--basic-auth"
            - "--basic-auth-username=test-username"
            - "--basic-auth-password=test-password"
          ports:
            - containerPort: 10000
              name: http
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: vice-operator-local
  namespace: vice-apps
spec:
  selector:
    app: vice-operator-local
  ports:
    - port: 10000
      targetPort: http
      name: http
