---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vice-operator
  namespace: vice-apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vice-operator
  template:
    metadata:
      labels:
        app: vice-operator
    spec:
      serviceAccountName: vice-operator
      tolerations:
        - key: "gpu"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
        - key: "analysis"
          operator: "Exists"
      containers:
        - name: vice-operator
          image: harbor.cyverse.org/de/app-exposer:test
          imagePullPolicy: Always
          command: ["/vice-operator"]
          args:
            - "--namespace=vice-apps"
            - "--port=10000"
            - "--max-analyses=0"
            - "--gpu-vendor=nvidia"
            - "--vice-base-url=https://cyverse.run:4545"
            - "--registry-server=harbor.cyverse.org"
            - "--registry-username=robot$de-jobs"
            - "--registry-password=BGi26jMOhI9TppGqXO6bcRe0G9TXabdH"
            - "--operator-pod-selector=app=vice-operator"
            - "--api-service-name=vice-operator-qa"
            - "--basic-auth"
            - "--basic-auth-username=test-username-qa"
            - "--basic-auth-password=test-password-qa"
            - "--keycloak-base-url=https://kc.cyverse.org/auth"
            - "--keycloak-client-id=vice-qa"
            - "--keycloak-client-secret=6b2016ea-b776-4743-ab02-2ab92519d0f3"
            - "--keycloak-realm=CyVerseTest"
          ports:
            - containerPort: 10000
              name: http
            - containerPort: 8080
              name: loading
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vice-operator
  namespace: vice-apps
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vice-operator
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "configmaps", "secrets", "persistentvolumes", "persistentvolumeclaims", "nodes"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "daemonsets"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gateways", "httproutes"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: ["traefik.io"]
    resources: ["middlewares"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vice-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vice-operator
subjects:
  - kind: ServiceAccount
    name: vice-operator
    namespace: vice-apps
