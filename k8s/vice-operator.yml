---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vice-operator
  namespace: vice-apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vice-operator
  template:
    metadata:
      labels:
        app: vice-operator
    spec:
      serviceAccountName: vice-operator
      containers:
        - name: vice-operator
          image: harbor.cyverse.org/de/app-exposer:qa
          imagePullPolicy: Always
          command: ["/vice-operator"]
          args:
            - "--namespace=vice-apps"
            - "--port=60001"
            - "--routing-type=nginx"
            - "--ingress-class=nginx"
            - "--max-analyses=5"
          ports:
            - containerPort: 60001
              name: http
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: vice-operator
  namespace: vice-apps
spec:
  selector:
    app: vice-operator
  ports:
    - port: 60001
      targetPort: http
      name: http
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vice-operator
  namespace: vice-apps
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vice-operator
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "configmaps", "persistentvolumes", "persistentvolumeclaims", "nodes"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vice-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vice-operator
subjects:
  - kind: ServiceAccount
    name: vice-operator
    namespace: vice-apps
