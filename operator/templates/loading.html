<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Launching: {{.AppName}} | Discovery Environment</title>
    <link rel="icon" href="/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            /* Discovery Environment palette
             * Source: cyverse-de/sonora — CyVersePalette.js, CyVerseTheme.js, theme/default/index.js */
            --de-cobalt:    #0971ab;   /* primary.main */
            --de-sky:       #99d9ea;   /* secondary.main */
            --de-navy:      #004471;
            --de-dark-navy: #142248;
            --de-appbar:    #074060;   /* main_appbar — hand-tuned in theme/default/index.js */
            --de-sidebar:   #052537;   /* main_sidebar */
            --de-grass:     #7cb342;   /* success.main */
            --de-yellow:    #f7d21e;   /* warning.main */
            --de-alert-red: #af0404;   /* error.main */
            --de-blue-grey: #48515f;   /* info.main */
            --de-bg:        #f4f4f4;
            --de-surface:   #ffffff;
            --de-silver:    #a5a4a4;
            --de-divider:   rgba(0,0,0,0.12);
            --de-border:    #e2e2e2;
            --de-fg-1:      #2b2b2b;
            --de-fg-2:      rgba(0,0,0,0.6);

            /* MUI elevation 1 / 2 */
            --de-shadow-1: 0 2px 1px -1px rgba(0,0,0,0.2),
                           0 1px 1px 0 rgba(0,0,0,0.14),
                           0 1px 3px 0 rgba(0,0,0,0.12);
            --de-shadow-2: 0 3px 1px -2px rgba(0,0,0,0.2),
                           0 2px 2px 0 rgba(0,0,0,0.14),
                           0 1px 5px 0 rgba(0,0,0,0.12);
        }

        html, body {
            font-family: "Roboto", "Helvetica", "Arial", sans-serif;
            background: var(--de-bg);
            color: var(--de-fg-1);
            -webkit-font-smoothing: antialiased;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* DE app-bar chrome — keeps users feeling like they're still inside the workbench. */
        .appbar {
            height: 64px;
            background: var(--de-appbar);
            color: #fff;
            display: flex;
            align-items: center;
            padding: 0 24px;
            box-shadow: var(--de-shadow-2);
            flex-shrink: 0;
        }

        .appbar .brand {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: inherit;
        }

        /* Combined DE binocular + wordmark — same SVG sonora renders via
         * components/icons/DEAppBarLogo. The path uses currentColor so the
         * appbar text color drives the fill. */
        .de-logo {
            height: 36px;
            width: auto;
            flex-shrink: 0;
            display: block;
        }

        .appbar .spacer { flex: 1; }

        .appbar .analysis-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 4px 4px 10px;
            background: rgba(255,255,255,0.08);
            border-radius: 4px;
            font-size: 0.8rem;
            font-family: "Roboto Mono", "Courier New", monospace;
            color: rgba(255,255,255,0.85);
            max-width: 360px;
            white-space: nowrap;
        }
        .appbar .analysis-pill .analysis-id-label {
            font-family: "Roboto", "Helvetica", "Arial", sans-serif;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            color: var(--de-sky);
            flex-shrink: 0;
            cursor: help;
        }
        .appbar .analysis-pill .analysis-id-value {
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
        }
        .appbar .analysis-pill .copy-btn {
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 26px;
            height: 26px;
            padding: 0;
            border: none;
            background: transparent;
            color: rgba(255,255,255,0.75);
            border-radius: 4px;
            cursor: pointer;
            flex-shrink: 0;
            transition: background-color 0.15s ease, color 0.15s ease;
        }
        .appbar .analysis-pill .copy-btn:hover {
            background: rgba(255,255,255,0.12);
            color: #fff;
        }
        .appbar .analysis-pill .copy-btn:focus-visible {
            outline: 2px solid var(--de-sky);
            outline-offset: 1px;
        }
        .appbar .analysis-pill .copy-btn.copied {
            color: var(--de-grass);
        }
        .appbar .analysis-pill .copy-btn .material-symbols-outlined {
            font-size: 18px;
        }

        /* Main canvas */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 48px 24px;
        }

        .card {
            background: var(--de-surface);
            box-shadow: var(--de-shadow-1);
            border-radius: 4px;
            width: 100%;
            max-width: 640px;
            overflow: hidden;
            animation: fadeUp 0.225s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card-header {
            padding: 20px 24px 16px;
            border-bottom: 1px solid var(--de-divider);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card-header .material-symbols-outlined {
            color: var(--de-cobalt);
            font-size: 24px;
        }

        .card-header h1 {
            /* MUI h6: 1.25rem, 500, info.main */
            font-size: 1.25rem;
            font-weight: 500;
            color: var(--de-blue-grey);
            line-height: 1.6;
            letter-spacing: 0.0075em;
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .card-header h1 .app-name {
            color: var(--de-dark-navy);
        }

        .card-body { padding: 24px; }

        /* Stage rail — the four discrete VICE phases (deploying → starting → almost-ready → ready),
         * shown as numbered steps so the user knows where they are in the launch sequence. */
        .stage-rail {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 24px;
        }

        .stage {
            display: flex;
            flex-direction: column;
            gap: 6px;
            position: relative;
        }

        .stage-track {
            height: 4px;
            background: var(--de-border);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }
        .stage-track-fill {
            position: absolute;
            inset: 0;
            background: var(--de-cobalt);
            transform-origin: left center;
            transform: scaleX(0);
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .stage.active .stage-track-fill { transform: scaleX(0.5); }
        .stage.done   .stage-track-fill { transform: scaleX(1); }

        /* Active stage gets a shimmer to signal "in progress". */
        .stage.active .stage-track-fill::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(
                90deg,
                transparent 0%,
                rgba(255,255,255,0.55) 50%,
                transparent 100%
            );
            animation: shimmer 1.6s linear infinite;
        }
        @keyframes shimmer {
            0%   { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .stage-label {
            font-size: 0.72rem;
            font-weight: 500;
            color: var(--de-silver);
            letter-spacing: 0.02em;
            line-height: 1.3;
            transition: color 0.225s ease;
        }
        .stage.active .stage-label,
        .stage.done   .stage-label { color: var(--de-blue-grey); }

        .stage-num {
            font-size: 0.65rem;
            font-weight: 500;
            color: var(--de-silver);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        /* Error state recolors the rail. */
        .stage-rail.error .stage-track-fill { background: var(--de-alert-red); }
        .stage-rail.error .stage.active .stage-track-fill::after { display: none; }
        .stage-rail.ready .stage-track-fill { background: var(--de-grass); }
        .stage-rail.ready .stage.active .stage-track-fill::after { display: none; }

        /* Status row */
        .status-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: var(--de-bg);
            border: 1px solid var(--de-divider);
            border-radius: 4px;
        }

        .status-row .status-icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            position: relative;
        }

        /* Indeterminate spinner for in-progress states. MUI-style: a single arc rotating. */
        .status-row .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid var(--de-border);
            border-top-color: var(--de-cobalt);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .status-row .material-symbols-outlined {
            font-size: 22px;
        }

        .status-msg {
            font-size: 0.875rem;
            color: var(--de-blue-grey);
            line-height: 1.43;
            flex: 1;
            min-width: 0;
        }

        .status-row.error  { background: rgba(175, 4, 4, 0.04); border-color: rgba(175, 4, 4, 0.3); }
        .status-row.error  .status-msg { color: var(--de-alert-red); font-weight: 500; }
        .status-row.error  .material-symbols-outlined { color: var(--de-alert-red); }

        .status-row.ready  { background: rgba(124, 179, 66, 0.06); border-color: rgba(124, 179, 66, 0.3); }
        .status-row.ready  .status-msg { color: var(--de-grass); font-weight: 500; }
        .status-row.ready  .material-symbols-outlined { color: var(--de-grass); }

        /* Actions row */
        .actions {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            align-items: center;
            flex-wrap: wrap;
        }

        /* MUI text/outlined button — sentence case (DE override) */
        .btn {
            font-family: inherit;
            font-size: 0.875rem;
            font-weight: 500;
            letter-spacing: 0.02857em;
            text-transform: none;
            padding: 6px 16px;
            border-radius: 4px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid transparent;
            background: transparent;
            color: var(--de-cobalt);
            text-decoration: none;
            line-height: 1.75;
            transition: background-color 0.15s ease;
        }
        .btn:hover { background: rgba(9, 113, 171, 0.08); }
        .btn.outlined {
            border-color: rgba(9, 113, 171, 0.5);
        }
        .btn.outlined:hover {
            border-color: var(--de-cobalt);
            background: rgba(9, 113, 171, 0.08);
        }
        .btn .material-symbols-outlined { font-size: 18px; }

        .support-link { display: none; }
        .support-link.visible { display: inline-flex; }

        .spacer-flex { flex: 1; }

        /* Details disclosure — a real <details> element so it's keyboard-accessible. */
        .details {
            margin-top: 16px;
            border-top: 1px solid var(--de-divider);
            padding-top: 16px;
        }

        .details summary {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--de-blue-grey);
            cursor: pointer;
            user-select: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            list-style: none;
            padding: 4px 8px;
            margin-left: -8px;
            border-radius: 4px;
            transition: background-color 0.15s ease;
        }
        .details summary::-webkit-details-marker { display: none; }
        .details summary:hover { background: rgba(0,0,0,0.04); }
        .details summary .material-symbols-outlined {
            font-size: 18px;
            transition: transform 0.225s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .details[open] summary .material-symbols-outlined { transform: rotate(180deg); }

        .details-body {
            margin-top: 12px;
            background: var(--de-bg);
            border: 1px solid var(--de-divider);
            border-radius: 4px;
            padding: 12px 14px;
            max-height: 280px;
            overflow-y: auto;
        }

        .details-body pre {
            font-family: "Roboto Mono", "SF Mono", Monaco, Consolas, monospace;
            font-size: 0.75rem;
            line-height: 1.6;
            color: var(--de-blue-grey);
            white-space: pre-wrap;
            word-break: break-all;
        }

        /* Footer — Powered by CyVerse, matching DE's footer treatment. */
        footer {
            padding: 20px 24px 24px;
            text-align: center;
            color: var(--de-silver);
            font-size: 0.75rem;
            line-height: 1.66;
            letter-spacing: 0.03333em;
        }
        footer a {
            color: var(--de-cobalt);
            text-decoration: none;
        }
        footer a:hover { text-decoration: underline; }
        footer .powered {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 4px;
            opacity: 0.85;
        }

        /* Responsive: collapse stage rail labels on narrow screens. */
        @media (max-width: 600px) {
            main { padding: 24px 16px; }
            .card-header { padding: 16px; }
            .card-body { padding: 16px; }
            .stage-label { display: none; }
            .appbar { padding: 0 16px; }
            .appbar .analysis-pill { display: none; }
        }
    </style>
</head>
<body>
    <header class="appbar">
        <a class="brand" href="https://cyverse.org" target="_blank" rel="noopener noreferrer" aria-label="CyVerse Discovery Environment">

            </svg>
        </a>
        <div class="spacer"></div>
        <div class="analysis-pill">
            <span class="analysis-id-label" title="Analysis ID">ID</span>
            <span class="analysis-id-value">{{.AnalysisID}}</span>
            <button type="button" class="copy-btn" id="copy-analysis-id" title="Copy analysis ID" aria-label="Copy analysis ID to clipboard">
                <span class="material-symbols-outlined" aria-hidden="true">content_copy</span>
            </button>
        </div>
    </header>

    <main>
        <div class="card" role="status" aria-live="polite">
            <div class="card-header">
                <span class="material-symbols-outlined">rocket_launch</span>
                <h1>Launching <span class="app-name">{{.AppName}}</span></h1>
            </div>
            <div class="card-body">
                <!-- Stage rail: 4 discrete steps that mirror the Stage type in operator/loading.go -->
                <div class="stage-rail" id="stage-rail" aria-hidden="true">
                    <div class="stage" data-stage="deploying">
                        <div class="stage-track"><div class="stage-track-fill"></div></div>
                        <div class="stage-num">Step 1</div>
                        <div class="stage-label">Deploying</div>
                    </div>
                    <div class="stage" data-stage="starting">
                        <div class="stage-track"><div class="stage-track-fill"></div></div>
                        <div class="stage-num">Step 2</div>
                        <div class="stage-label">Starting</div>
                    </div>
                    <div class="stage" data-stage="almost-ready">
                        <div class="stage-track"><div class="stage-track-fill"></div></div>
                        <div class="stage-num">Step 3</div>
                        <div class="stage-label">Almost ready</div>
                    </div>
                    <div class="stage" data-stage="ready">
                        <div class="stage-track"><div class="stage-track-fill"></div></div>
                        <div class="stage-num">Step 4</div>
                        <div class="stage-label">Ready</div>
                    </div>
                </div>

                <div class="status-row" id="status-row">
                    <div class="status-icon"><div class="spinner" id="spinner"></div></div>
                    <div class="status-msg" id="status">Connecting…</div>
                </div>

                <div class="actions">
                    <a class="btn outlined support-link" id="support" href="/cdn-cgi/l/email-protection#15666065657a676155766c63706766703b7a67722a6660777f70766128435c56503027255974607b767d30272553747c79606770302725383027256e6e3b547b74796c667c665c516868">
                        <span class="material-symbols-outlined">mail</span>
                        Contact Support
                    </a>
                    <div class="spacer-flex"></div>
                </div>

                <details class="details" id="details">
                    <summary>
                        <span class="material-symbols-outlined">expand_more</span>
                        Show technical details
                    </summary>
                    <div class="details-body">
                        <pre id="details-content">Waiting for status…</pre>
                    </div>
                </details>
            </div>
        </div>
    </main>

    <footer>
        <div class="powered">
            Powered by CyVerse at The University of Arizona
        </div>
    </footer>

    <script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
    (function() {
        var analysisID = "{{.AnalysisID}}";
        var timeoutMs = {{.TimeoutMs}};
        var startTime = Date.now();
        var pollInterval = 5000;
        // The ready-reload delay gives the Gateway time to reconcile the
        // HTTPRoute swap into data-plane config before the browser reloads.
        // Too short and the reload races the swap and lands on a fresh
        // loading page that can never recover.
        var readyReloadDelayMs = 3000;
        // Consecutive poll failures that trigger an auto-reload. Once the
        // HTTPRoute swaps, /loading/status stops existing on this host and
        // every poll 404s — reloading is the only way for the browser to
        // re-resolve through the gateway and land on the analysis service.
        var maxConsecutiveErrors = 2;
        var consecutiveErrors = 0;

        var stageRail = document.getElementById("stage-rail");
        var statusRow = document.getElementById("status-row");
        var spinner = document.getElementById("spinner");
        var statusEl = document.getElementById("status");
        var support = document.getElementById("support");
        var detailsContent = document.getElementById("details-content");
        var headerIcon = document.querySelector(".card-header .material-symbols-outlined");
        var copyBtn = document.getElementById("copy-analysis-id");

        if (copyBtn) {
            var copyResetTimer = null;
            var originalCopyTitle = copyBtn.getAttribute("title");
            copyBtn.addEventListener("click", function() {
                var done = function(ok) {
                    copyBtn.classList.toggle("copied", ok);
                    copyBtn.setAttribute("title", ok ? "Copied!" : "Copy failed");
                    if (copyResetTimer) clearTimeout(copyResetTimer);
                    copyResetTimer = setTimeout(function() {
                        copyBtn.classList.remove("copied");
                        copyBtn.setAttribute("title", originalCopyTitle);
                    }, 1500);
                };
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(analysisID).then(function() { done(true); }, function() { done(false); });
                    return;
                }
                // Fallback for browsers without the async Clipboard API (or insecure contexts).
                var ta = document.createElement("textarea");
                ta.value = analysisID;
                ta.setAttribute("readonly", "");
                ta.style.position = "absolute";
                ta.style.left = "-9999px";
                document.body.appendChild(ta);
                ta.select();
                var ok = false;
                try { ok = document.execCommand("copy"); } catch (e) { ok = false; }
                document.body.removeChild(ta);
                done(ok);
            });
        }

        var stageOrder = ["deploying", "starting", "almost-ready", "ready"];

        var stageMessages = {
            "deploying":    "Deploying your analysis environment\u2026",
            "starting":     "Starting services\u2026",
            "almost-ready": "Almost ready\u2026",
            "ready":        "Ready! Redirecting\u2026",
            "error":        "Failed to start."
        };

        function setStage(stage) {
            // Reset
            stageRail.classList.remove("error", "ready");
            var stages = stageRail.querySelectorAll(".stage");
            for (var i = 0; i < stages.length; i++) {
                stages[i].classList.remove("active", "done");
            }

            if (stage === "error") {
                stageRail.classList.add("error");
                // Mark currently-active step as the failure point.
                var idx = parseInt(stageRail.getAttribute("data-last-idx") || "0", 10);
                for (var j = 0; j < idx; j++) stages[j].classList.add("done");
                if (stages[idx]) stages[idx].classList.add("active");
                return;
            }

            var idx = stageOrder.indexOf(stage);
            if (idx < 0) return;
            stageRail.setAttribute("data-last-idx", String(idx));
            for (var k = 0; k < idx; k++) stages[k].classList.add("done");
            if (stage === "ready") {
                stages[idx].classList.add("done");
                stageRail.classList.add("ready");
            } else {
                stages[idx].classList.add("active");
            }
        }

        function setStatusKind(kind) {
            statusRow.classList.remove("error", "ready");
            // Replace the spinner with an icon for terminal states.
            var icon = document.querySelector(".status-icon");
            if (kind === "error") {
                statusRow.classList.add("error");
                icon.innerHTML = '<span class="material-symbols-outlined">error</span>';
            } else if (kind === "ready") {
                statusRow.classList.add("ready");
                icon.innerHTML = '<span class="material-symbols-outlined">check_circle</span>';
            } else {
                icon.innerHTML = '<div class="spinner"></div>';
            }
        }

        function poll() {
            // Check client-side timeout.
            if (timeoutMs > 0 && (Date.now() - startTime) > timeoutMs) {
                showError("Launch timed out. Please contact support.", {
                    stage: "client-timeout",
                    error: "client-side timeout after " + timeoutMs + "ms"
                });
                return;
            }

            fetch("/loading/status")
                .then(function(resp) {
                    if (!resp.ok) throw new Error("status " + resp.status);
                    return resp.json();
                })
                .then(function(data) {
                    consecutiveErrors = 0;

                    if (data.stage === "error") {
                        // Show a friendly message; the raw error goes into the
                        // details panel and the Contact Support mailto body so
                        // the user isn't confronted with Kubernetes jargon.
                        showError(
                            "We couldn't bring your analysis online. " +
                            "Please terminate it from the Analyses page and " +
                            "try launching again, or contact support if this " +
                            "keeps happening.",
                            data
                        );
                        updateDetails(data);
                        return;
                    }

                    setStage(data.stage);
                    if (data.stage === "ready") {
                        setStatusKind("ready");
                    } else {
                        setStatusKind("normal");
                    }

                    statusEl.textContent = stageMessages[data.stage] || data.stage;
                    updateDetails(data);

                    if (data.ready) {
                        setTimeout(function() {
                            window.location.reload();
                        }, readyReloadDelayMs);
                        return;
                    }

                    setTimeout(poll, pollInterval);
                })
                .catch(function(err) {
                    console.warn("poll error:", err);
                    consecutiveErrors++;
                    // If /loading/status has become unreachable for several
                    // polls in a row, the HTTPRoute has likely swapped to
                    // the analysis service. Reload so the browser routes
                    // fresh through the gateway and lands on the app.
                    if (consecutiveErrors >= maxConsecutiveErrors) {
                        window.location.reload();
                        return;
                    }
                    setTimeout(poll, pollInterval);
                });
        }

        function showError(msg, data) {
            statusEl.textContent = msg;
            setStatusKind("error");
            setStage("error");
            support.classList.add("visible");
            // Rebuild the Contact Support mailto with the specifics support
            // needs to triage: analysis ID, stage at failure, raw error,
            // and the moment the failure was observed. Saves the user from
            // copying fields out of the Details panel and saves support a
            // round-trip asking for logs.
            if (data) {
                updateSupportLink(data);
            }
        }

        function updateSupportLink(data) {
            var rawError = (data && data.error) ? data.error : "unknown";
            var stage    = (data && data.stage) ? data.stage : "unknown";
            var body =
                "Analysis: " + analysisID + "\n" +
                "Stage at failure: " + stage + "\n" +
                "Error: " + rawError + "\n" +
                "Time: " + new Date().toISOString() + "\n\n" +
                "(Please describe what you were trying to do.)";
            support.href =
                "mailto:support@cyverse.org" +
                "?subject=" + encodeURIComponent("VICE Launch Failure - " + analysisID) +
                "&body=" + encodeURIComponent(body);
        }

        function updateDetails(data) {
            var lines = [];
            // Surface the raw error at the top of the details panel when
            // present. The friendly status message above hides it from
            // casual users; operators expanding details want to see the
            // underlying cause first, pod state second.
            if (data.error) {
                lines.push("Error: " + data.error);
                lines.push("");
            }
            if (!data.pods || data.pods.length === 0) {
                if (lines.length === 0) {
                    detailsContent.textContent = "No pods found yet.";
                    return;
                }
                lines.push("No pods found yet.");
                detailsContent.textContent = lines.join("\n");
                return;
            }
            data.pods.forEach(function(pod) {
                lines.push("Pod: " + pod.name + " (" + pod.phase + ", ready=" + pod.ready + ")");
                if (pod.containerStatuses) {
                    pod.containerStatuses.forEach(function(cs) {
                        var line = "  " + cs.name + ": " + cs.state;
                        if (cs.reason) line += " (" + cs.reason + ")";
                        line += " ready=" + cs.ready + " restarts=" + cs.restartCount;
                        lines.push(line);
                    });
                }
            });
            detailsContent.textContent = lines.join("\n");
        }

        poll();
    })();
    </script>
</body>
