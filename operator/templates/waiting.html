<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waiting for Analysis | Discovery Environment</title>
    <link rel="icon" href="/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            /* Discovery Environment palette (subset used here) */
            --de-cobalt:    #0971ab;
            --de-sky:       #99d9ea;
            --de-navy:      #004471;
            --de-dark-navy: #142248;
            --de-appbar:    #074060;
            --de-blue-grey: #48515f;
            --de-bg:        #f4f4f4;
            --de-surface:   #ffffff;
            --de-silver:    #a5a4a4;
            --de-divider:   rgba(0,0,0,0.12);
            --de-border:    #e2e2e2;
            --de-fg-1:      #2b2b2b;

            --de-shadow-1: 0 2px 1px -1px rgba(0,0,0,0.2),
                           0 1px 1px 0 rgba(0,0,0,0.14),
                           0 1px 3px 0 rgba(0,0,0,0.12);
            --de-shadow-2: 0 3px 1px -2px rgba(0,0,0,0.2),
                           0 2px 2px 0 rgba(0,0,0,0.14),
                           0 1px 5px 0 rgba(0,0,0,0.12);
        }

        html, body {
            font-family: "Roboto", "Helvetica", "Arial", sans-serif;
            background: var(--de-bg);
            color: var(--de-fg-1);
            -webkit-font-smoothing: antialiased;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .appbar {
            height: 64px;
            background: var(--de-appbar);
            color: #fff;
            display: flex;
            align-items: center;
            padding: 0 24px;
            box-shadow: var(--de-shadow-2);
            flex-shrink: 0;
        }
        .appbar .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            letter-spacing: 0.01em;
        }
        .de-mark { width: 36px; height: 24px; flex-shrink: 0; }
        .appbar .product { font-size: 0.95rem; line-height: 1.1; }
        .appbar .product .row1 { font-weight: 500; letter-spacing: 0.04em; }
        .appbar .product .row2 {
            font-weight: 400;
            font-size: 0.78rem;
            letter-spacing: 0.06em;
            color: rgba(255,255,255,0.78);
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 48px 24px;
        }

        .card {
            background: var(--de-surface);
            box-shadow: var(--de-shadow-1);
            border-radius: 4px;
            width: 100%;
            max-width: 480px;
            padding: 40px 32px 32px;
            text-align: center;
            animation: fadeUp 0.225s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* MUI-style indeterminate circular progress: a single rotating arc.
         * Same idiom Sonora uses while skeleton-loading — feels native. */
        .progress {
            width: 48px;
            height: 48px;
            margin: 0 auto 24px;
            position: relative;
        }
        .progress svg {
            width: 100%;
            height: 100%;
            animation: rotate 1.4s linear infinite;
        }
        .progress circle {
            fill: none;
            stroke: var(--de-cobalt);
            stroke-width: 3.6;
            stroke-linecap: round;
            stroke-dasharray: 80, 200;
            stroke-dashoffset: 0;
            animation: dash 1.4s ease-in-out infinite;
        }
        @keyframes rotate { to { transform: rotate(360deg); } }
        @keyframes dash {
            0%   { stroke-dasharray: 1, 200;   stroke-dashoffset: 0; }
            50%  { stroke-dasharray: 100, 200; stroke-dashoffset: -15px; }
            100% { stroke-dasharray: 100, 200; stroke-dashoffset: -125px; }
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 500;
            color: var(--de-blue-grey);
            line-height: 1.6;
            letter-spacing: 0.0075em;
            margin-bottom: 12px;
        }

        .message {
            font-size: 0.875rem;
            font-weight: 400;
            color: var(--de-blue-grey);
            line-height: 1.5;
            letter-spacing: 0.00938em;
            margin-bottom: 24px;
            text-wrap: pretty;
        }

        .countdown {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--de-silver);
            letter-spacing: 0.03333em;
            background: var(--de-bg);
            border: 1px solid var(--de-divider);
            border-radius: 999px;
            padding: 6px 14px;
        }
        .countdown .material-symbols-outlined {
            font-size: 16px;
            color: var(--de-cobalt);
        }

        footer {
            padding: 20px 24px 24px;
            text-align: center;
            color: var(--de-silver);
            font-size: 0.75rem;
            line-height: 1.66;
            letter-spacing: 0.03333em;
        }

        @media (max-width: 600px) {
            main { padding: 24px 16px; }
            .card { padding: 32px 20px; }
            .appbar { padding: 0 16px; }
        }
    </style>
</head>
<body>
    <header class="appbar">
        <div class="brand">
            <svg class="de-mark" viewBox="0 0 90 60" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <g fill="#fff">
                    <circle cx="22" cy="30" r="22"/>
                    <circle cx="68" cy="30" r="22"/>
                    <rect x="22" y="22" width="46" height="16"/>
                </g>
                <g fill="#074060">
                    <circle cx="22" cy="30" r="13"/>
                    <circle cx="68" cy="30" r="13"/>
                </g>
                <g fill="#fff" opacity="0.95">
                    <circle cx="18" cy="26" r="3"/>
                    <circle cx="64" cy="26" r="3"/>
                </g>
            </svg>
            <div class="product">
                <div class="row1">DISCOVERY</div>
                <div class="row2">ENVIRONMENT</div>
            </div>
        </div>
    </header>

    <main>
        <div class="card" role="status" aria-live="polite">
            <div class="progress" aria-hidden="true">
                <svg viewBox="22 22 44 44">
                    <circle cx="44" cy="44" r="20.2"></circle>
                </svg>
            </div>
            <h1>Waiting for your analysis</h1>
            <p class="message">
                Your analysis is being prepared. This page will
                automatically refresh until your environment is ready.
            </p>
            <div class="countdown" id="countdown">
                <span class="material-symbols-outlined">schedule</span>
                <span id="countdown-text">Refreshing soon&hellip;</span>
            </div>
        </div>
    </main>

    <footer>
        Discovery Environment &middot; CyVerse
    </footer>

    <script>
    (function() {
        var interval = {{.RefreshSeconds}};
        var remaining = interval;
        var countdownEl = document.getElementById("countdown-text");

        function updateCountdown() {
            countdownEl.textContent = "Refreshing in " + remaining + "s\u2026";
        }

        function tick() {
            remaining--;
            if (remaining <= 0) {
                countdownEl.textContent = "Refreshing\u2026";
                window.location.reload();
                return;
            }
            updateCountdown();
            setTimeout(tick, 1000);
        }

        updateCountdown();
        setTimeout(tick, 1000);
    })();
    </script>
</body>
</html>
