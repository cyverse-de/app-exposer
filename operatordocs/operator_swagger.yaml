  v1.PodAffinity:
    properties:
      preferredDuringSchedulingIgnoredDuringExecution:
        description: |-
          The scheduler will prefer to schedule pods to nodes that satisfy
          the affinity expressions specified by this field, but it may choose
          a node that violates one or more of the expressions. The node that is
          most preferred is the one with the greatest sum of weights, i.e.
          for each node that meets all of the scheduling requirements (resource
          request, requiredDuringScheduling affinity expressions, etc.),
          compute a sum by iterating through the elements of this field and adding
          "weight" to the sum if the node has pods which matches the corresponding podAffinityTerm; the
          node(s) with the highest sum are the most preferred.
          +optional
          +listType=atomic
        items:
          $ref: '#/definitions/v1.WeightedPodAffinityTerm'
        type: array
      requiredDuringSchedulingIgnoredDuringExecution:
        description: |-
          If the affinity requirements specified by this field are not met at
          scheduling time, the pod will not be scheduled onto the node.
          If the affinity requirements specified by this field cease to be met
          at some point during pod execution (e.g. due to a pod label update), the
          system may or may not try to eventually evict the pod from its node.
          When there are multiple elements, the lists of nodes corresponding to each
          podAffinityTerm are intersected, i.e. all terms must be satisfied.
          +optional
          +listType=atomic
        items:
          $ref: '#/definitions/v1.PodAffinityTerm'
        type: array
    type: object
  v1.PodAffinityTerm:
    properties:
      labelSelector:
        allOf:
        - $ref: '#/definitions/v1.LabelSelector'
        description: |-
          A label query over a set of resources, in this case pods.
          If it's null, this PodAffinityTerm matches with no Pods.
          +optional
      matchLabelKeys:
        description: |-
          MatchLabelKeys is a set of pod label keys to select which pods will
          be taken into consideration. The keys are used to lookup values from the
          incoming pod labels, those key-value labels are merged with `labelSelector` as `key in (value)`
          to select the group of existing pods which pods will be taken into consideration
          for the incoming pod's pod (anti) affinity. Keys that don't exist in the incoming
          pod labels will be ignored. The default value is empty.
          The same key is forbidden to exist in both matchLabelKeys and labelSelector.
          Also, matchLabelKeys cannot be set when labelSelector isn't set.

          +listType=atomic
          +optional
        items:
          type: string
        type: array
      mismatchLabelKeys:
        description: |-
          MismatchLabelKeys is a set of pod label keys to select which pods will
          be taken into consideration. The keys are used to lookup values from the
          incoming pod labels, those key-value labels are merged with `labelSelector` as `key notin (value)`
          to select the group of existing pods which pods will be taken into consideration
          for the incoming pod's pod (anti) affinity. Keys that don't exist in the incoming
          pod labels will be ignored. The default value is empty.
          The same key is forbidden to exist in both mismatchLabelKeys and labelSelector.
          Also, mismatchLabelKeys cannot be set when labelSelector isn't set.

          +listType=atomic
          +optional
        items:
          type: string
        type: array
      namespaceSelector:
        allOf:
        - $ref: '#/definitions/v1.LabelSelector'
        description: |-
          A label query over the set of namespaces that the term applies to.
          The term is applied to the union of the namespaces selected by this field
          and the ones listed in the namespaces field.
          null selector and null or empty namespaces list means "this pod's namespace".
          An empty selector ({}) matches all namespaces.
          +optional
      namespaces:
        description: |-
          namespaces specifies a static list of namespace names that the term applies to.
          The term is applied to the union of the namespaces listed in this field
          and the ones selected by namespaceSelector.
          null or empty namespaces list and null namespaceSelector means "this pod's namespace".
          +optional
          +listType=atomic
        items:
          type: string
        type: array
      topologyKey:
        description: |-
          This pod should be co-located (affinity) or not co-located (anti-affinity) with the pods matching
          the labelSelector in the specified namespaces, where co-located is defined as running on a node
          whose value of the label with key topologyKey matches that of any node on which any of the
          selected pods is running.
          Empty topologyKey is not allowed.
        type: string
    type: object
  v1.PodAntiAffinity:
    properties:
      preferredDuringSchedulingIgnoredDuringExecution:
        description: |-
          The scheduler will prefer to schedule pods to nodes that satisfy
          the anti-affinity expressions specified by this field, but it may choose
          a node that violates one or more of the expressions. The node that is
          most preferred is the one with the greatest sum of weights, i.e.
          for each node that meets all of the scheduling requirements (resource
          request, requiredDuringScheduling anti-affinity expressions, etc.),
          compute a sum by iterating through the elements of this field and subtracting
          "weight" from the sum if the node has pods which matches the corresponding podAffinityTerm; the
          node(s) with the highest sum are the most preferred.
          +optional
          +listType=atomic
        items:
          $ref: '#/definitions/v1.WeightedPodAffinityTerm'
        type: array
      requiredDuringSchedulingIgnoredDuringExecution:
        description: |-
          If the anti-affinity requirements specified by this field are not met at
          scheduling time, the pod will not be scheduled onto the node.
          If the anti-affinity requirements specified by this field cease to be met
          at some point during pod execution (e.g. due to a pod label update), the
          system may or may not try to eventually evict the pod from its node.
          When there are multiple elements, the lists of nodes corresponding to each
          podAffinityTerm are intersected, i.e. all terms must be satisfied.
          +optional
          +listType=atomic
        items:
          $ref: '#/definitions/v1.PodAffinityTerm'
        type: array
    type: object
  v1.PodCertificateProjection:
    properties:
      certificateChainPath:
        description: |-
          Write the certificate chain at this path in the projected volume.

          Most applications should use credentialBundlePath.  When using keyPath
          and certificateChainPath, your application needs to check that the key
          and leaf certificate are consistent, because it is possible to read the
          files mid-rotation.

          +optional
        type: string
      credentialBundlePath:
        description: |-
          Write the credential bundle at this path in the projected volume.

          The credential bundle is a single file that contains multiple PEM blocks.
          The first PEM block is a PRIVATE KEY block, containing a PKCS#8 private
          key.

          The remaining blocks are CERTIFICATE blocks, containing the issued
          certificate chain from the signer (leaf and any intermediates).

          Using credentialBundlePath lets your Pod's application code make a single
          atomic read that retrieves a consistent key and certificate chain.  If you
          project them to separate files, your application code will need to
          additionally check that the leaf certificate was issued to the key.

          +optional
        type: string
      keyPath:
        description: |-
          Write the key at this path in the projected volume.

          Most applications should use credentialBundlePath.  When using keyPath
          and certificateChainPath, your application needs to check that the key
          and leaf certificate are consistent, because it is possible to read the
          files mid-rotation.

          +optional
        type: string
      keyType:
        description: |-
          The type of keypair Kubelet will generate for the pod.

          Valid values are "RSA3072", "RSA4096", "ECDSAP256", "ECDSAP384",
          "ECDSAP521", and "ED25519".

          +required
        type: string
      maxExpirationSeconds:
        description: |-
          maxExpirationSeconds is the maximum lifetime permitted for the
          certificate.

          Kubelet copies this value verbatim into the PodCertificateRequests it
          generates for this projection.

          If omitted, kube-apiserver will set it to 86400(24 hours). kube-apiserver
          will reject values shorter than 3600 (1 hour).  The maximum allowable
          value is 7862400 (91 days).

          The signer implementation is then free to issue a certificate with any
          lifetime *shorter* than MaxExpirationSeconds, but no shorter than 3600
          seconds (1 hour).  This constraint is enforced by kube-apiserver.
          `kubernetes.io` signers will never issue certificates with a lifetime
          longer than 24 hours.

          +optional
        type: integer
      signerName:
        description: |-
          Kubelet's generated CSRs will be addressed to this signer.

          +required
        type: string
    type: object
  v1.PodConditionType:
    enum:
    - ContainersReady
    - Initialized
    - Ready
    - PodScheduled
    - DisruptionTarget
    - PodReadyToStartContainers
    - PodResizePending
    - PodResizeInProgress
    type: string
    x-enum-varnames:
    - ContainersReady
    - PodInitialized
    - PodReady
    - PodScheduled
    - DisruptionTarget
    - PodReadyToStartContainers
    - PodResizePending
    - PodResizeInProgress
  v1.PodDNSConfig:
    properties:
      nameservers:
        description: |-
          A list of DNS name server IP addresses.
          This will be appended to the base nameservers generated from DNSPolicy.
          Duplicated nameservers will be removed.
          +optional
          +listType=atomic
        items:
          type: string
        type: array
      options:
        description: |-
          A list of DNS resolver options.
          This will be merged with the base options generated from DNSPolicy.
          Duplicated entries will be removed. Resolution options given in Options
          will override those that appear in the base DNSPolicy.
          +optional
          +listType=atomic
        items:
          $ref: '#/definitions/v1.PodDNSConfigOption'
        type: array
      searches:
        description: |-
          A list of DNS search domains for host-name lookup.
          This will be appended to the base search paths generated from DNSPolicy.
          Duplicated search paths will be removed.
          +optional
          +listType=atomic
        items:
          type: string
        type: array
    type: object
  v1.PodDNSConfigOption:
    properties:
      name:
        description: |-
          Name is this DNS resolver option's name.
          Required.
        type: string
      value:
        description: |-
          Value is this DNS resolver option's value.
          +optional
        type: string
    type: object
  v1.PodDisruptionBudget:
    properties:
      apiVersion:
        description: |-
          APIVersion defines the versioned schema of this representation of an object.
          Servers should convert recognized schemas to the latest internal value, and
          may reject unrecognized values.
          More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
          +optional
        type: string
      kind:
        description: |-
          Kind is a string value representing the REST resource this object represents.
          Servers may infer this from the endpoint the client submits requests to.
          Cannot be updated.
          In CamelCase.
          More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
          +optional
        type: string
      metadata:
        allOf:
        - $ref: '#/definitions/v1.ObjectMeta'
        description: |-
          Standard object's metadata.
          More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#metadata
          +optional
      spec:
        allOf:
        - $ref: '#/definitions/v1.PodDisruptionBudgetSpec'
        description: |-
          Specification of the desired behavior of the PodDisruptionBudget.
          +optional
      status:
        allOf:
        - $ref: '#/definitions/v1.PodDisruptionBudgetStatus'
        description: |-
          Most recently observed status of the PodDisruptionBudget.
          +optional
    type: object
  v1.PodDisruptionBudgetSpec:
    properties:
      maxUnavailable:
        allOf:
        - $ref: '#/definitions/intstr.IntOrString'
        description: |-
          An eviction is allowed if at most "maxUnavailable" pods selected by
          "selector" are unavailable after the eviction, i.e. even in absence of
          the evicted pod. For example, one can prevent all voluntary evictions
          by specifying 0. This is a mutually exclusive setting with "minAvailable".
          +optional
      minAvailable:
        allOf:
        - $ref: '#/definitions/intstr.IntOrString'
        description: |-
          An eviction is allowed if at least "minAvailable" pods selected by
          "selector" will still be available after the eviction, i.e. even in the
          absence of the evicted pod.  So for example you can prevent all voluntary
          evictions by specifying "100%".
          +optional
      selector:
        allOf:
        - $ref: '#/definitions/v1.LabelSelector'
        description: |-
          Label query over pods whose evictions are managed by the disruption
          budget.
          A null selector will match no pods, while an empty ({}) selector will select
          all pods within the namespace.
          +patchStrategy=replace
          +optional
      unhealthyPodEvictionPolicy:
        allOf:
        - $ref: '#/definitions/v1.UnhealthyPodEvictionPolicyType'
        description: |-
          UnhealthyPodEvictionPolicy defines the criteria for when unhealthy pods
          should be considered for eviction. Current implementation considers healthy pods,
          as pods that have status.conditions item with type="Ready",status="True".

          Valid policies are IfHealthyBudget and AlwaysAllow.
          If no policy is specified, the default behavior will be used,
          which corresponds to the IfHealthyBudget policy.

          IfHealthyBudget policy means that running pods (status.phase="Running"),
          but not yet healthy can be evicted only if the guarded application is not
          disrupted (status.currentHealthy is at least equal to status.desiredHealthy).
          Healthy pods will be subject to the PDB for eviction.

          AlwaysAllow policy means that all running pods (status.phase="Running"),
          but not yet healthy are considered disrupted and can be evicted regardless
          of whether the criteria in a PDB is met. This means perspective running
          pods of a disrupted application might not get a chance to become healthy.
          Healthy pods will be subject to the PDB for eviction.

          Additional policies may be added in the future.
          Clients making eviction decisions should disallow eviction of unhealthy pods
          if they encounter an unrecognized policy in this field.
          +optional
    type: object
  v1.PodDisruptionBudgetStatus:
    properties:
      conditions:
        description: |-
          Conditions contain conditions for PDB. The disruption controller sets the
          DisruptionAllowed condition. The following are known values for the reason field
          (additional reasons could be added in the future):
          - SyncFailed: The controller encountered an error and wasn't able to compute
                        the number of allowed disruptions. Therefore no disruptions are
                        allowed and the status of the condition will be False.
          - InsufficientPods: The number of pods are either at or below the number
                              required by the PodDisruptionBudget. No disruptions are
                              allowed and the status of the condition will be False.
          - SufficientPods: There are more pods than required by the PodDisruptionBudget.
                            The condition will be True, and the number of allowed
                            disruptions are provided by the disruptionsAllowed property.

          +optional
          +patchMergeKey=type
          +patchStrategy=merge
          +listType=map
          +listMapKey=type
        items:
          $ref: '#/definitions/v1.Condition'
        type: array
      currentHealthy:
        description: current number of healthy pods
        type: integer
      desiredHealthy:
        description: minimum desired number of healthy pods
        type: integer
      disruptedPods:
        additionalProperties:
          type: string
        description: |-
          DisruptedPods contains information about pods whose eviction was
          processed by the API server eviction subresource handler but has not
          yet been observed by the PodDisruptionBudget controller.
          A pod will be in this map from the time when the API server processed the
          eviction request to the time when the pod is seen by PDB controller
          as having been marked for deletion (or after a timeout). The key in the map is the name of the pod
          and the value is the time when the API server processed the eviction request. If
          the deletion didn't occur and a pod is still there it will be removed from
          the list automatically by PodDisruptionBudget controller after some time.
          If everything goes smooth this map should be empty for the most of the time.
          Large number of entries in the map may indicate problems with pod deletions.
          +optional
        type: object
      disruptionsAllowed:
        description: Number of pod disruptions that are currently allowed.
        type: integer
      expectedPods:
        description: total number of pods counted by this disruption budget
        type: integer
      observedGeneration:
        description: |-
          Most recent generation observed when updating this PDB status. DisruptionsAllowed and other
          status information is valid only if observedGeneration equals to PDB's object generation.
          +optional
        type: integer
    type: object
  v1.PodFSGroupChangePolicy:
    enum:
    - OnRootMismatch
    - Always
    type: string
    x-enum-varnames:
    - FSGroupChangeOnRootMismatch
    - FSGroupChangeAlways
  v1.PodOS:
    properties:
      name:
        allOf:
        - $ref: '#/definitions/v1.OSName'
        description: |-
          Name is the name of the operating system. The currently supported values are linux and windows.
          Additional value may be defined in future and can be one of:
          https://github.com/opencontainers/runtime-spec/blob/master/config.md#platform-specific-configuration
          Clients should expect to handle additional values and treat unrecognized values in this field as os: null
    type: object
  v1.PodReadinessGate:
    properties:
      conditionType:
        allOf:
        - $ref: '#/definitions/v1.PodConditionType'
        description: ConditionType refers to a condition in the pod's condition list
          with matching type.
    type: object
  v1.PodResourceClaim:
    properties:
      name:
        description: |-
          Name uniquely identifies this resource claim inside the pod.
          This must be a DNS_LABEL.
        type: string
      resourceClaimName:
        description: |-
          ResourceClaimName is the name of a ResourceClaim object in the same
          namespace as this pod.

          Exactly one of ResourceClaimName and ResourceClaimTemplateName must
          be set.
        type: string
      resourceClaimTemplateName:
        description: |-
          ResourceClaimTemplateName is the name of a ResourceClaimTemplate
          object in the same namespace as this pod.

          The template will be used to create a new ResourceClaim, which will
          be bound to this pod. When this pod is deleted, the ResourceClaim
          will also be deleted. The pod name and resource name, along with a
          generated component, will be used to form a unique name for the
          ResourceClaim, which will be recorded in pod.status.resourceClaimStatuses.

          This field is immutable and no changes will be made to the
          corresponding ResourceClaim by the control plane after creating the
          ResourceClaim.

          Exactly one of ResourceClaimName and ResourceClaimTemplateName must
          be set.
        type: string
    type: object
  v1.PodSELinuxChangePolicy:
    enum:
    - Recursive
    - MountOption
    type: string
    x-enum-varnames:
    - SELinuxChangePolicyRecursive
    - SELinuxChangePolicyMountOption
  v1.PodSchedulingGate:
    properties:
      name:
        description: |-
          Name of the scheduling gate.
          Each scheduling gate must have a unique name field.
        type: string
    type: object
  v1.PodSecurityContext:
    properties:
      appArmorProfile:
        allOf:
        - $ref: '#/definitions/v1.AppArmorProfile'
        description: |-
          appArmorProfile is the AppArmor options to use by the containers in this pod.
          Note that this field cannot be set when spec.os.name is windows.
          +optional
      fsGroup:
        description: |-
          A special supplemental group that applies to all containers in a pod.
          Some volume types allow the Kubelet to change the ownership of that volume
          to be owned by the pod:

          1. The owning GID will be the FSGroup
          2. The setgid bit is set (new files created in the volume will be owned by FSGroup)
          3. The permission bits are OR'd with rw-rw----

          If unset, the Kubelet will not modify the ownership and permissions of any volume.
          Note that this field cannot be set when spec.os.name is windows.
          +optional
        type: integer
      fsGroupChangePolicy:
        allOf:
        - $ref: '#/definitions/v1.PodFSGroupChangePolicy'
        description: |-
          fsGroupChangePolicy defines behavior of changing ownership and permission of the volume
          before being exposed inside Pod. This field will only apply to
          volume types which support fsGroup based ownership(and permissions).
          It will have no effect on ephemeral volume types such as: secret, configmaps
          and emptydir.
          Valid values are "OnRootMismatch" and "Always". If not specified, "Always" is used.
          Note that this field cannot be set when spec.os.name is windows.
          +optional
      runAsGroup:
        description: |-
          The GID to run the entrypoint of the container process.
          Uses runtime default if unset.
          May also be set in SecurityContext.  If set in both SecurityContext and
          PodSecurityContext, the value specified in SecurityContext takes precedence
          for that container.
          Note that this field cannot be set when spec.os.name is windows.
          +optional
        type: integer
      runAsNonRoot:
        description: |-
          Indicates that the container must run as a non-root user.
          If true, the Kubelet will validate the image at runtime to ensure that it
          does not run as UID 0 (root) and fail to start the container if it does.
          If unset or false, no such validation will be performed.
          May also be set in SecurityContext.  If set in both SecurityContext and
          PodSecurityContext, the value specified in SecurityContext takes precedence.
          +optional
        type: boolean
      runAsUser:
        description: |-
          The UID to run the entrypoint of the container process.
          Defaults to user specified in image metadata if unspecified.
          May also be set in SecurityContext.  If set in both SecurityContext and
          PodSecurityContext, the value specified in SecurityContext takes precedence
          for that container.
          Note that this field cannot be set when spec.os.name is windows.
          +optional
        type: integer
      seLinuxChangePolicy:
        allOf:
        - $ref: '#/definitions/v1.PodSELinuxChangePolicy'
        description: |-
          seLinuxChangePolicy defines how the container's SELinux label is applied to all volumes used by the Pod.
          It has no effect on nodes that do not support SELinux or to volumes does not support SELinux.
          Valid values are "MountOption" and "Recursive".

          "Recursive" means relabeling of all files on all Pod volumes by the container runtime.
          This may be slow for large volumes, but allows mixing privileged and unprivileged Pods sharing the same volume on the same node.

          "MountOption" mounts all eligible Pod volumes with `-o context` mount option.
          This requires all Pods that share the same volume to use the same SELinux label.
          It is not possible to share the same volume among privileged and unprivileged Pods.
          Eligible volumes are in-tree FibreChannel and iSCSI volumes, and all CSI volumes
          whose CSI driver announces SELinux support by setting spec.seLinuxMount: true in their
          CSIDriver instance. Other volumes are always re-labelled recursively.
          "MountOption" value is allowed only when SELinuxMount feature gate is enabled.

          If not specified and SELinuxMount feature gate is enabled, "MountOption" is used.
          If not specified and SELinuxMount feature gate is disabled, "MountOption" is used for ReadWriteOncePod volumes
          and "Recursive" for all other volumes.

          This field affects only Pods that have SELinux label set, either in PodSecurityContext or in SecurityContext of all containers.

          All Pods that use the same volume should use the same seLinuxChangePolicy, otherwise some pods can get stuck in ContainerCreating state.
          Note that this field cannot be set when spec.os.name is windows.
          +featureGate=SELinuxChangePolicy
          +optional
      seLinuxOptions:
        allOf:
        - $ref: '#/definitions/v1.SELinuxOptions'
        description: |-
          The SELinux context to be applied to all containers.
          If unspecified, the container runtime will allocate a random SELinux context for each
          container.  May also be set in SecurityContext.  If set in
          both SecurityContext and PodSecurityContext, the value specified in SecurityContext
          takes precedence for that container.
          Note that this field cannot be set when spec.os.name is windows.
          +optional
      seccompProfile:
        allOf:
        - $ref: '#/definitions/v1.SeccompProfile'
        description: |-
          The seccomp options to use by the containers in this pod.
          Note that this field cannot be set when spec.os.name is windows.
          +optional
      supplementalGroups:
        description: |-
          A list of groups applied to the first process run in each container, in
          addition to the container's primary GID and fsGroup (if specified).  If
          the SupplementalGroupsPolicy feature is enabled, the
          supplementalGroupsPolicy field determines whether these are in addition
          to or instead of any group memberships defined in the container image.
          If unspecified, no additional groups are added, though group memberships
          defined in the container image may still be used, depending on the
          supplementalGroupsPolicy field.
          Note that this field cannot be set when spec.os.name is windows.
          +optional
          +listType=atomic
        items:
          type: integer
        type: array
      supplementalGroupsPolicy:
        allOf:
        - $ref: '#/definitions/v1.SupplementalGroupsPolicy'
        description: |-
          Defines how supplemental groups of the first container processes are calculated.
          Valid values are "Merge" and "Strict". If not specified, "Merge" is used.
          (Alpha) Using the field requires the SupplementalGroupsPolicy feature gate to be enabled
          and the container runtime must implement support for this feature.
          Note that this field cannot be set when spec.os.name is windows.
          TODO: update the default value to "Merge" when spec.os.name is not windows in v1.34
          +featureGate=SupplementalGroupsPolicy
          +optional
      sysctls:
        description: |-
          Sysctls hold a list of namespaced sysctls used for the pod. Pods with unsupported
          sysctls (by the container runtime) might fail to launch.
          Note that this field cannot be set when spec.os.name is windows.
          +optional
          +listType=atomic
        items:
          $ref: '#/definitions/v1.Sysctl'
        type: array
      windowsOptions:
        allOf:
        - $ref: '#/definitions/v1.WindowsSecurityContextOptions'
        description: |-
          The Windows specific settings applied to all containers.
          If unspecified, the options within a container's SecurityContext will be used.
          If set in both SecurityContext and PodSecurityContext, the value specified in SecurityContext takes precedence.
          Note that this field cannot be set when spec.os.name is linux.
          +optional
    type: object
  v1.PodSpec:
    properties:
      activeDeadlineSeconds:
        description: |-
          Optional duration in seconds the pod may be active on the node relative to
          StartTime before the system will actively try to mark it failed and kill associated containers.
          Value must be a positive integer.
          +optional
        type: integer
      affinity:
        allOf:
        - $ref: '#/definitions/v1.Affinity'
        description: |-
          If specified, the pod's scheduling constraints
          +optional
      automountServiceAccountToken:
        description: |-
          AutomountServiceAccountToken indicates whether a service account token should be automatically mounted.
          +optional
        type: boolean
      containers:
        description: |-
          List of containers belonging to the pod.
          Containers cannot currently be added or removed.
          There must be at least one container in a Pod.
          Cannot be updated.
          +patchMergeKey=name
          +patchStrategy=merge
          +listType=map
          +listMapKey=name
        items:
          $ref: '#/definitions/v1.Container'
        type: array
      dnsConfig:
        allOf:
        - $ref: '#/definitions/v1.PodDNSConfig'
        description: |-
          Specifies the DNS parameters of a pod.
          Parameters specified here will be merged to the generated DNS
          configuration based on DNSPolicy.
          +optional
      dnsPolicy:
        allOf:
        - $ref: '#/definitions/v1.DNSPolicy'
        description: |-
          Set DNS policy for the pod.
          Defaults to "ClusterFirst".
          Valid values are 'ClusterFirstWithHostNet', 'ClusterFirst', 'Default' or 'None'.
          DNS parameters given in DNSConfig will be merged with the policy selected with DNSPolicy.
          To have DNS options set along with hostNetwork, you have to specify DNS policy
          explicitly to 'ClusterFirstWithHostNet'.
          +optional
      enableServiceLinks:
        description: |-
          EnableServiceLinks indicates whether information about services should be injected into pod's
          environment variables, matching the syntax of Docker links.
          Optional: Defaults to true.
          +optional
        type: boolean
      ephemeralContainers:
        description: |-
          List of ephemeral containers run in this pod. Ephemeral containers may be run in an existing
          pod to perform user-initiated actions such as debugging. This list cannot be specified when
          creating a pod, and it cannot be modified by updating the pod spec. In order to add an
          ephemeral container to an existing pod, use the pod's ephemeralcontainers subresource.
          +optional
          +patchMergeKey=name
          +patchStrategy=merge
          +listType=map
          +listMapKey=name
        items:
          $ref: '#/definitions/v1.EphemeralContainer'
        type: array
      hostAliases:
        description: |-
          HostAliases is an optional list of hosts and IPs that will be injected into the pod's hosts
          file if specified.
          +optional
          +patchMergeKey=ip
          +patchStrategy=merge
          +listType=map
          +listMapKey=ip
        items:
          $ref: '#/definitions/v1.HostAlias'
        type: array
      hostIPC:
        description: |-
          Use the host's ipc namespace.
          Optional: Default to false.
          +k8s:conversion-gen=false
          +optional
        type: boolean
      hostNetwork:
        description: |-
          Host networking requested for this pod. Use the host's network namespace.
          When using HostNetwork you should specify ports so the scheduler is aware.
          When `hostNetwork` is true, specified `hostPort` fields in port definitions must match `containerPort`,
          and unspecified `hostPort` fields in port definitions are defaulted to match `containerPort`.
          Default to false.
          +k8s:conversion-gen=false
          +optional
        type: boolean
      hostPID:
        description: |-
          Use the host's pid namespace.
          Optional: Default to false.
          +k8s:conversion-gen=false
          +optional
        type: boolean
      hostUsers:
        description: |-
          Use the host's user namespace.
          Optional: Default to true.
          If set to true or not present, the pod will be run in the host user namespace, useful
          for when the pod needs a feature only available to the host user namespace, such as
          loading a kernel module with CAP_SYS_MODULE.
          When set to false, a new userns is created for the pod. Setting false is useful for
          mitigating container breakout vulnerabilities even allowing users to run their
          containers as root without actually having root privileges on the host.
          This field is alpha-level and is only honored by servers that enable the UserNamespacesSupport feature.
          +k8s:conversion-gen=false
          +optional
        type: boolean
      hostname:
        description: |-
          Specifies the hostname of the Pod
          If not specified, the pod's hostname will be set to a system-defined value.
          +optional
        type: string
      hostnameOverride:
        description: |-
          HostnameOverride specifies an explicit override for the pod's hostname as perceived by the pod.
          This field only specifies the pod's hostname and does not affect its DNS records.
          When this field is set to a non-empty string:
          - It takes precedence over the values set in `hostname` and `subdomain`.
          - The Pod's hostname will be set to this value.
          - `setHostnameAsFQDN` must be nil or set to false.
          - `hostNetwork` must be set to false.

          This field must be a valid DNS subdomain as defined in RFC 1123 and contain at most 64 characters.
          Requires the HostnameOverride feature gate to be enabled.

          +featureGate=HostnameOverride
          +optional
        type: string
      imagePullSecrets:
        description: |-
          ImagePullSecrets is an optional list of references to secrets in the same namespace to use for pulling any of the images used by this PodSpec.
          If specified, these secrets will be passed to individual puller implementations for them to use.
          More info: https://kubernetes.io/docs/concepts/containers/images#specifying-imagepullsecrets-on-a-pod
          +optional
          +patchMergeKey=name
          +patchStrategy=merge
          +listType=map
          +listMapKey=name
        items:
          $ref: '#/definitions/k8s_io_api_core_v1.LocalObjectReference'
        type: array
      initContainers:
        description: |-
          List of initialization containers belonging to the pod.
          Init containers are executed in order prior to containers being started. If any
          init container fails, the pod is considered to have failed and is handled according
          to its restartPolicy. The name for an init container or normal container must be
          unique among all containers.
          Init containers may not have Lifecycle actions, Readiness probes, Liveness probes, or Startup probes.
          The resourceRequirements of an init container are taken into account during scheduling
          by finding the highest request/limit for each resource type, and then using the max of
          that value or the sum of the normal containers. Limits are applied to init containers
          in a similar fashion.
          Init containers cannot currently be added or removed.
          Cannot be updated.
          More info: https://kubernetes.io/docs/concepts/workloads/pods/init-containers/
          +patchMergeKey=name
          +patchStrategy=merge
          +listType=map
          +listMapKey=name
        items:
          $ref: '#/definitions/v1.Container'
        type: array
      nodeName:
        description: |-
          NodeName indicates in which node this pod is scheduled.
          If empty, this pod is a candidate for scheduling by the scheduler defined in schedulerName.
          Once this field is set, the kubelet for this node becomes responsible for the lifecycle of this pod.
          This field should not be used to express a desire for the pod to be scheduled on a specific node.
          https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#nodename
          +optional
        type: string
      nodeSelector:
        additionalProperties:
          type: string
        description: |-
          NodeSelector is a selector which must be true for the pod to fit on a node.
          Selector which must match a node's labels for the pod to be scheduled on that node.
          More info: https://kubernetes.io/docs/concepts/configuration/assign-pod-node/
          +optional
          +mapType=atomic
        type: object
      os:
        allOf:
        - $ref: '#/definitions/v1.PodOS'
        description: |-
          Specifies the OS of the containers in the pod.
          Some pod and container fields are restricted if this is set.

          If the OS field is set to linux, the following fields must be unset:
          -securityContext.windowsOptions

          If the OS field is set to windows, following fields must be unset:
          - spec.hostPID
          - spec.hostIPC
          - spec.hostUsers
          - spec.resources
          - spec.securityContext.appArmorProfile
          - spec.securityContext.seLinuxOptions
          - spec.securityContext.seccompProfile
          - spec.securityContext.fsGroup
          - spec.securityContext.fsGroupChangePolicy
          - spec.securityContext.sysctls
          - spec.shareProcessNamespace
          - spec.securityContext.runAsUser
          - spec.securityContext.runAsGroup
          - spec.securityContext.supplementalGroups
          - spec.securityContext.supplementalGroupsPolicy
          - spec.containers[*].securityContext.appArmorProfile
          - spec.containers[*].securityContext.seLinuxOptions
          - spec.containers[*].securityContext.seccompProfile
          - spec.containers[*].securityContext.capabilities
          - spec.containers[*].securityContext.readOnlyRootFilesystem
          - spec.containers[*].securityContext.privileged
          - spec.containers[*].securityContext.allowPrivilegeEscalation
          - spec.containers[*].securityContext.procMount
          - spec.containers[*].securityContext.runAsUser
          - spec.containers[*].securityContext.runAsGroup
          +optional
      overhead:
        allOf:
        - $ref: '#/definitions/v1.ResourceList'
        description: |-
          Overhead represents the resource overhead associated with running a pod for a given RuntimeClass.
          This field will be autopopulated at admission time by the RuntimeClass admission controller. If
          the RuntimeClass admission controller is enabled, overhead must not be set in Pod create requests.
          The RuntimeClass admission controller will reject Pod create requests which have the overhead already
          set. If RuntimeClass is configured and selected in the PodSpec, Overhead will be set to the value
          defined in the corresponding RuntimeClass, otherwise it will remain unset and treated as zero.
          More info: https://git.k8s.io/enhancements/keps/sig-node/688-pod-overhead/README.md
          +optional
      preemptionPolicy:
        allOf:
        - $ref: '#/definitions/v1.PreemptionPolicy'
        description: |-
          PreemptionPolicy is the Policy for preempting pods with lower priority.
          One of Never, PreemptLowerPriority.
          Defaults to PreemptLowerPriority if unset.
          +optional
      priority:
        description: |-
          The priority value. Various system components use this field to find the
          priority of the pod. When Priority Admission Controller is enabled, it
          prevents users from setting this field. The admission controller populates
          this field from PriorityClassName.
          The higher the value, the higher the priority.
          +optional
        type: integer
      priorityClassName:
        description: |-
          If specified, indicates the pod's priority. "system-node-critical" and
          "system-cluster-critical" are two special keywords which indicate the
          highest priorities with the former being the highest priority. Any other
          name must be defined by creating a PriorityClass object with that name.
          If not specified, the pod priority will be default or zero if there is no
          default.
          +optional
        type: string
      readinessGates:
        description: |-
          If specified, all readiness gates will be evaluated for pod readiness.
          A pod is ready when all its containers are ready AND
          all conditions specified in the readiness gates have status equal to "True"
          More info: https://git.k8s.io/enhancements/keps/sig-network/580-pod-readiness-gates
          +optional
          +listType=atomic
        items:
          $ref: '#/definitions/v1.PodReadinessGate'
        type: array
      resourceClaims:
        description: |-
          ResourceClaims defines which ResourceClaims must be allocated
          and reserved before the Pod is allowed to start. The resources
          will be made available to those containers which consume them
          by name.

          This is an alpha field and requires enabling the
          DynamicResourceAllocation feature gate.

          This field is immutable.

          +patchMergeKey=name
          +patchStrategy=merge,retainKeys
          +listType=map
          +listMapKey=name
          +featureGate=DynamicResourceAllocation
          +optional
        items:
          $ref: '#/definitions/v1.PodResourceClaim'
        type: array
      resources:
        allOf:
        - $ref: '#/definitions/v1.ResourceRequirements'
        description: |-
          Resources is the total amount of CPU and Memory resources required by all
          containers in the pod. It supports specifying Requests and Limits for
          "cpu", "memory" and "hugepages-" resource names only. ResourceClaims are not supported.

          This field enables fine-grained control over resource allocation for the
          entire pod, allowing resource sharing among containers in a pod.
          TODO: For beta graduation, expand this comment with a detailed explanation.

          This is an alpha field and requires enabling the PodLevelResources feature
          gate.

          +featureGate=PodLevelResources
          +optional
      restartPolicy:
        allOf:
        - $ref: '#/definitions/v1.RestartPolicy'
        description: |-
          Restart policy for all containers within the pod.
          One of Always, OnFailure, Never. In some contexts, only a subset of those values may be permitted.
          Default to Always.
          More info: https://kubernetes.io/docs/concepts/workloads/pods/pod-lifecycle/#restart-policy
          +optional
      runtimeClassName:
        description: |-
          RuntimeClassName refers to a RuntimeClass object in the node.k8s.io group, which should be used
          to run this pod.  If no RuntimeClass resource matches the named class, the pod will not be run.
          If unset or empty, the "legacy" RuntimeClass will be used, which is an implicit class with an
          empty definition that uses the default runtime handler.
          More info: https://git.k8s.io/enhancements/keps/sig-node/585-runtime-class
          +optional
        type: string
      schedulerName:
        description: |-
          If specified, the pod will be dispatched by specified scheduler.
          If not specified, the pod will be dispatched by default scheduler.
          +optional
        type: string
      schedulingGates:
        description: |-
          SchedulingGates is an opaque list of values that if specified will block scheduling the pod.
          If schedulingGates is not empty, the pod will stay in the SchedulingGated state and the
          scheduler will not attempt to schedule the pod.

          SchedulingGates can only be set at pod creation time, and be removed only afterwards.

          +patchMergeKey=name
          +patchStrategy=merge
          +listType=map
          +listMapKey=name
          +optional
        items:
          $ref: '#/definitions/v1.PodSchedulingGate'
        type: array
      securityContext:
        allOf:
        - $ref: '#/definitions/v1.PodSecurityContext'
        description: |-
          SecurityContext holds pod-level security attributes and common container settings.
          Optional: Defaults to empty.  See type description for default values of each field.
          +optional
      serviceAccount:
        description: |-
          DeprecatedServiceAccount is a deprecated alias for ServiceAccountName.
          Deprecated: Use serviceAccountName instead.
          +k8s:conversion-gen=false
          +optional
        type: string
      serviceAccountName:
        description: |-
          ServiceAccountName is the name of the ServiceAccount to use to run this pod.
          More info: https://kubernetes.io/docs/tasks/configure-pod-container/configure-service-account/
          +optional
        type: string
      setHostnameAsFQDN:
        description: |-
          If true the pod's hostname will be configured as the pod's FQDN, rather than the leaf name (the default).
          In Linux containers, this means setting the FQDN in the hostname field of the kernel (the nodename field of struct utsname).
          In Windows containers, this means setting the registry value of hostname for the registry key HKEY_LOCAL_MACHINE\\SYSTEM\\CurrentControlSet\\Services\\Tcpip\\Parameters to FQDN.
          If a pod does not have FQDN, this has no effect.
          Default to false.
          +optional
        type: boolean
      shareProcessNamespace:
        description: |-
          Share a single process namespace between all of the containers in a pod.
          When this is set containers will be able to view and signal processes from other containers
          in the same pod, and the first process in each container will not be assigned PID 1.
          HostPID and ShareProcessNamespace cannot both be set.
          Optional: Default to false.
          +k8s:conversion-gen=false
          +optional
        type: boolean
      subdomain:
        description: |-
          If specified, the fully qualified Pod hostname will be "<hostname>.<subdomain>.<pod namespace>.svc.<cluster domain>".
          If not specified, the pod will not have a domainname at all.
          +optional
        type: string
      terminationGracePeriodSeconds:
        description: |-
          Optional duration in seconds the pod needs to terminate gracefully. May be decreased in delete request.
          Value must be non-negative integer. The value zero indicates stop immediately via
          the kill signal (no opportunity to shut down).
          If this value is nil, the default grace period will be used instead.
          The grace period is the duration in seconds after the processes running in the pod are sent
          a termination signal and the time when the processes are forcibly halted with a kill signal.
          Set this value longer than the expected cleanup time for your process.
          Defaults to 30 seconds.
          +optional
        type: integer
      tolerations:
        description: |-
          If specified, the pod's tolerations.
          +optional
          +listType=atomic
        items:
          $ref: '#/definitions/v1.Toleration'
        type: array
      topologySpreadConstraints:
        description: |-
          TopologySpreadConstraints describes how a group of pods ought to spread across topology
          domains. Scheduler will schedule pods in a way which abides by the constraints.
          All topologySpreadConstraints are ANDed.
          +optional
          +patchMergeKey=topologyKey
          +patchStrategy=merge
          +listType=map
          +listMapKey=topologyKey
          +listMapKey=whenUnsatisfiable
        items:
          $ref: '#/definitions/v1.TopologySpreadConstraint'
        type: array
      volumes:
        description: |-
          List of volumes that can be mounted by containers belonging to the pod.
          More info: https://kubernetes.io/docs/concepts/storage/volumes
          +optional
          +patchMergeKey=name
          +patchStrategy=merge,retainKeys
          +listType=map
          +listMapKey=name
        items:
          $ref: '#/definitions/v1.Volume'
        type: array
    type: object
  v1.PodTemplateSpec:
    properties:
      metadata:
        allOf:
        - $ref: '#/definitions/v1.ObjectMeta'
        description: |-
          Standard object's metadata.
          More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#metadata
          +optional
      spec:
        allOf:
        - $ref: '#/definitions/v1.PodSpec'
        description: |-
          Specification of the desired behavior of the pod.
          More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#spec-and-status
          +optional
    type: object
  v1.PortStatus:
    properties:
      error:
        description: |-
          Error is to record the problem with the service port
          The format of the error shall comply with the following rules:
          - built-in error values shall be specified in this file and those shall use
            CamelCase names
          - cloud provider specific error values must have names that comply with the
            format foo.example.com/CamelCase.
          ---
          The regex it matches is (dns1123SubdomainFmt/)?(qualifiedNameFmt)
          +optional
          +kubebuilder:validation:Required
          +kubebuilder:validation:Pattern=`^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$`
          +kubebuilder:validation:MaxLength=316
        type: string
      port:
        description: Port is the port number of the service port of which status is
          recorded here
        type: integer
      protocol:
        allOf:
        - $ref: '#/definitions/v1.Protocol'
        description: |-
          Protocol is the protocol of the service port of which status is recorded here
          The supported values are: "TCP", "UDP", "SCTP"
    type: object
  v1.PortworxVolumeSource:
    properties:
      fsType:
        description: |-
          fSType represents the filesystem type to mount
          Must be a filesystem type supported by the host operating system.
          Ex. "ext4", "xfs". Implicitly inferred to be "ext4" if unspecified.
        type: string
      readOnly:
        description: |-
          readOnly defaults to false (read/write). ReadOnly here will force
          the ReadOnly setting in VolumeMounts.
          +optional
        type: boolean
      volumeID:
        description: volumeID uniquely identifies a Portworx volume
        type: string
    type: object
  v1.PreemptionPolicy:
    enum:
    - PreemptLowerPriority
    - Never
    type: string
    x-enum-varnames:
    - PreemptLowerPriority
    - PreemptNever
  v1.PreferredSchedulingTerm:
    properties:
      preference:
        allOf:
        - $ref: '#/definitions/v1.NodeSelectorTerm'
        description: A node selector term, associated with the corresponding weight.
      weight:
        description: Weight associated with matching the corresponding nodeSelectorTerm,
          in the range 1-100.
        type: integer
    type: object
  v1.Probe:
    properties:
      exec:
        allOf:
        - $ref: '#/definitions/v1.ExecAction'
        description: |-
          Exec specifies a command to execute in the container.
          +optional
      failureThreshold:
        description: |-
          Minimum consecutive failures for the probe to be considered failed after having succeeded.
          Defaults to 3. Minimum value is 1.
          +optional
        type: integer
      grpc:
        allOf:
        - $ref: '#/definitions/v1.GRPCAction'
        description: |-
          GRPC specifies a GRPC HealthCheckRequest.
          +optional
      httpGet:
        allOf:
        - $ref: '#/definitions/v1.HTTPGetAction'
        description: |-
          HTTPGet specifies an HTTP GET request to perform.
          +optional
      initialDelaySeconds:
        description: |-
          Number of seconds after the container has started before liveness probes are initiated.
          More info: https://kubernetes.io/docs/concepts/workloads/pods/pod-lifecycle#container-probes
          +optional
        type: integer
      periodSeconds:
        description: |-
          How often (in seconds) to perform the probe.
          Default to 10 seconds. Minimum value is 1.
          +optional
        type: integer
      successThreshold:
        description: |-
          Minimum consecutive successes for the probe to be considered successful after having failed.
          Defaults to 1. Must be 1 for liveness and startup. Minimum value is 1.
          +optional
        type: integer
      tcpSocket:
        allOf:
        - $ref: '#/definitions/v1.TCPSocketAction'
        description: |-
          TCPSocket specifies a connection to a TCP port.
          +optional
      terminationGracePeriodSeconds:
        description: |-
          Optional duration in seconds the pod needs to terminate gracefully upon probe failure.
          The grace period is the duration in seconds after the processes running in the pod are sent
          a termination signal and the time when the processes are forcibly halted with a kill signal.
          Set this value longer than the expected cleanup time for your process.
          If this value is nil, the pod's terminationGracePeriodSeconds will be used. Otherwise, this
          value overrides the value provided by the pod spec.
          Value must be non-negative integer. The value zero indicates stop immediately via
          the kill signal (no opportunity to shut down).
          This is a beta field and requires enabling ProbeTerminationGracePeriod feature gate.
          Minimum value is 1. spec.terminationGracePeriodSeconds is used if unset.
          +optional
        type: integer
      timeoutSeconds:
        description: |-
          Number of seconds after which the probe times out.
          Defaults to 1 second. Minimum value is 1.
          More info: https://kubernetes.io/docs/concepts/workloads/pods/pod-lifecycle#container-probes
          +optional
        type: integer
    type: object
  v1.ProcMountType:
    enum:
    - Default
    - Unmasked
    type: string
    x-enum-varnames:
    - DefaultProcMount
    - UnmaskedProcMount
  v1.ProjectedVolumeSource:
    properties:
      defaultMode:
        description: |-
          defaultMode are the mode bits used to set permissions on created files by default.
          Must be an octal value between 0000 and 0777 or a decimal value between 0 and 511.
          YAML accepts both octal and decimal values, JSON requires decimal values for mode bits.
          Directories within the path are not affected by this setting.
          This might be in conflict with other options that affect the file
          mode, like fsGroup, and the result can be other mode bits set.
          +optional
        type: integer
      sources:
        description: |-
          sources is the list of volume projections. Each entry in this list
          handles one source.
          +optional
          +listType=atomic
        items:
          $ref: '#/definitions/v1.VolumeProjection'
        type: array
    type: object
  v1.Protocol:
    enum:
    - TCP
    - UDP
    - SCTP
    type: string
    x-enum-varnames:
    - ProtocolTCP
    - ProtocolUDP
    - ProtocolSCTP
  v1.PullPolicy:
    enum:
    - Always
    - Never
    - IfNotPresent
    type: string
    x-enum-varnames:
    - PullAlways
    - PullNever
    - PullIfNotPresent
  v1.QueryParamMatchType:
    enum:
    - Exact
    - RegularExpression
    type: string
    x-enum-varnames:
    - QueryParamMatchExact
    - QueryParamMatchRegularExpression
  v1.QuobyteVolumeSource:
    properties:
      group:
        description: |-
          group to map volume access to
          Default is no group
          +optional
        type: string
      readOnly:
        description: |-
          readOnly here will force the Quobyte volume to be mounted with read-only permissions.
          Defaults to false.
          +optional
        type: boolean
      registry:
        description: |-
          registry represents a single or multiple Quobyte Registry services
          specified as a string as host:port pair (multiple entries are separated with commas)
          which acts as the central registry for volumes
        type: string
      tenant:
        description: |-
          tenant owning the given Quobyte volume in the Backend
          Used with dynamically provisioned Quobyte volumes, value is set by the plugin
          +optional
        type: string
      user:
        description: |-
          user to map volume access to
          Defaults to serivceaccount user
          +optional
        type: string
      volume:
        description: volume is a string that references an already created Quobyte
          volume by name.
        type: string
    type: object
  v1.RBDPersistentVolumeSource:
    properties:
      fsType:
        description: |-
          fsType is the filesystem type of the volume that you want to mount.
          Tip: Ensure that the filesystem type is supported by the host operating system.
          Examples: "ext4", "xfs", "ntfs". Implicitly inferred to be "ext4" if unspecified.
          More info: https://kubernetes.io/docs/concepts/storage/volumes#rbd
