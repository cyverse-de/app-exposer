          When not set, MountPropagationNone is used.
          This field is beta in 1.10.
          When RecursiveReadOnly is set to IfPossible or to Enabled, MountPropagation must be None or unspecified
          (which defaults to None).
          +optional
      name:
        description: This must match the Name of a Volume.
        type: string
      readOnly:
        description: |-
          Mounted read-only if true, read-write otherwise (false or unspecified).
          Defaults to false.
          +optional
        type: boolean
      recursiveReadOnly:
        allOf:
        - $ref: '#/definitions/v1.RecursiveReadOnlyMode'
        description: |-
          RecursiveReadOnly specifies whether read-only mounts should be handled
          recursively.

          If ReadOnly is false, this field has no meaning and must be unspecified.

          If ReadOnly is true, and this field is set to Disabled, the mount is not made
          recursively read-only.  If this field is set to IfPossible, the mount is made
          recursively read-only, if it is supported by the container runtime.  If this
          field is set to Enabled, the mount is made recursively read-only if it is
          supported by the container runtime, otherwise the pod will not be started and
          an error will be generated to indicate the reason.

          If this field is set to IfPossible or Enabled, MountPropagation must be set to
          None (or be unspecified, which defaults to None).

          If this field is not specified, it is treated as an equivalent of Disabled.

          +featureGate=RecursiveReadOnlyMounts
          +optional
      subPath:
        description: |-
          Path within the volume from which the container's volume should be mounted.
          Defaults to "" (volume's root).
          +optional
        type: string
      subPathExpr:
        description: |-
          Expanded path within the volume from which the container's volume should be mounted.
          Behaves similarly to SubPath but environment variable references $(VAR_NAME) are expanded using the container's environment.
          Defaults to "" (volume's root).
          SubPathExpr and SubPath are mutually exclusive.
          +optional
        type: string
    type: object
  v1.VolumeMountStatus:
    properties:
      mountPath:
        description: MountPath corresponds to the original VolumeMount.
        type: string
      name:
        description: Name corresponds to the name of the original VolumeMount.
        type: string
      readOnly:
        description: |-
          ReadOnly corresponds to the original VolumeMount.
          +optional
        type: boolean
      recursiveReadOnly:
        allOf:
        - $ref: '#/definitions/v1.RecursiveReadOnlyMode'
        description: |-
          RecursiveReadOnly must be set to Disabled, Enabled, or unspecified (for non-readonly mounts).
          An IfPossible value in the original VolumeMount must be translated to Disabled or Enabled,
          depending on the mount result.
          +featureGate=RecursiveReadOnlyMounts
          +optional
    type: object
  v1.VolumeNodeAffinity:
    properties:
      required:
        allOf:
        - $ref: '#/definitions/v1.NodeSelector'
        description: required specifies hard node constraints that must be met.
    type: object
  v1.VolumeProjection:
    properties:
      clusterTrustBundle:
        allOf:
        - $ref: '#/definitions/v1.ClusterTrustBundleProjection'
        description: |-
          ClusterTrustBundle allows a pod to access the `.spec.trustBundle` field
          of ClusterTrustBundle objects in an auto-updating file.

          Alpha, gated by the ClusterTrustBundleProjection feature gate.

          ClusterTrustBundle objects can either be selected by name, or by the
          combination of signer name and a label selector.

          Kubelet performs aggressive normalization of the PEM contents written
          into the pod filesystem.  Esoteric PEM features such as inter-block
          comments and block headers are stripped.  Certificates are deduplicated.
          The ordering of certificates within the file is arbitrary, and Kubelet
          may change the order over time.

          +featureGate=ClusterTrustBundleProjection
          +optional
      configMap:
        allOf:
        - $ref: '#/definitions/v1.ConfigMapProjection'
        description: |-
          configMap information about the configMap data to project
          +optional
      downwardAPI:
        allOf:
        - $ref: '#/definitions/v1.DownwardAPIProjection'
        description: |-
          downwardAPI information about the downwardAPI data to project
          +optional
      podCertificate:
        allOf:
        - $ref: '#/definitions/v1.PodCertificateProjection'
        description: |-
          Projects an auto-rotating credential bundle (private key and certificate
          chain) that the pod can use either as a TLS client or server.

          Kubelet generates a private key and uses it to send a
          PodCertificateRequest to the named signer.  Once the signer approves the
          request and issues a certificate chain, Kubelet writes the key and
          certificate chain to the pod filesystem.  The pod does not start until
          certificates have been issued for each podCertificate projected volume
          source in its spec.

          Kubelet will begin trying to rotate the certificate at the time indicated
          by the signer using the PodCertificateRequest.Status.BeginRefreshAt
          timestamp.

          Kubelet can write a single file, indicated by the credentialBundlePath
          field, or separate files, indicated by the keyPath and
          certificateChainPath fields.

          The credential bundle is a single file in PEM format.  The first PEM
          entry is the private key (in PKCS#8 format), and the remaining PEM
          entries are the certificate chain issued by the signer (typically,
          signers will return their certificate chain in leaf-to-root order).

          Prefer using the credential bundle format, since your application code
          can read it atomically.  If you use keyPath and certificateChainPath,
          your application must make two separate file reads. If these coincide
          with a certificate rotation, it is possible that the private key and leaf
          certificate you read may not correspond to each other.  Your application
          will need to check for this condition, and re-read until they are
          consistent.

          The named signer controls chooses the format of the certificate it
          issues; consult the signer implementation's documentation to learn how to
          use the certificates it issues.

          +featureGate=PodCertificateProjection +optional
      secret:
        allOf:
        - $ref: '#/definitions/v1.SecretProjection'
        description: |-
          secret information about the secret data to project
          +optional
      serviceAccountToken:
        allOf:
        - $ref: '#/definitions/v1.ServiceAccountTokenProjection'
        description: |-
          serviceAccountToken is information about the serviceAccountToken data to project
          +optional
    type: object
  v1.VolumeResourceRequirements:
    properties:
      limits:
        allOf:
        - $ref: '#/definitions/v1.ResourceList'
        description: |-
          Limits describes the maximum amount of compute resources allowed.
          More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
          +optional
      requests:
        allOf:
        - $ref: '#/definitions/v1.ResourceList'
        description: |-
          Requests describes the minimum amount of compute resources required.
          If Requests is omitted for a container, it defaults to Limits if that is explicitly specified,
          otherwise to an implementation-defined value. Requests cannot exceed Limits.
          More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
          +optional
    type: object
  v1.VsphereVirtualDiskVolumeSource:
    properties:
      fsType:
        description: |-
          fsType is filesystem type to mount.
          Must be a filesystem type supported by the host operating system.
          Ex. "ext4", "xfs", "ntfs". Implicitly inferred to be "ext4" if unspecified.
          +optional
        type: string
      storagePolicyID:
        description: |-
          storagePolicyID is the storage Policy Based Management (SPBM) profile ID associated with the StoragePolicyName.
          +optional
        type: string
      storagePolicyName:
        description: |-
          storagePolicyName is the storage Policy Based Management (SPBM) profile name.
          +optional
        type: string
      volumePath:
        description: volumePath is the path that identifies vSphere volume vmdk
        type: string
    type: object
  v1.WeightedPodAffinityTerm:
    properties:
      podAffinityTerm:
        allOf:
        - $ref: '#/definitions/v1.PodAffinityTerm'
        description: Required. A pod affinity term, associated with the corresponding
          weight.
      weight:
        description: |-
          weight associated with matching the corresponding podAffinityTerm,
          in the range 1-100.
        type: integer
    type: object
  v1.WindowsSecurityContextOptions:
    properties:
      gmsaCredentialSpec:
        description: |-
          GMSACredentialSpec is where the GMSA admission webhook
          (https://github.com/kubernetes-sigs/windows-gmsa) inlines the contents of the
          GMSA credential spec named by the GMSACredentialSpecName field.
          +optional
        type: string
      gmsaCredentialSpecName:
        description: |-
          GMSACredentialSpecName is the name of the GMSA credential spec to use.
          +optional
        type: string
      hostProcess:
        description: |-
          HostProcess determines if a container should be run as a 'Host Process' container.
          All of a Pod's containers must have the same effective HostProcess value
          (it is not allowed to have a mix of HostProcess containers and non-HostProcess containers).
          In addition, if HostProcess is true then HostNetwork must also be set to true.
          +optional
        type: boolean
      runAsUserName:
        description: |-
          The UserName in Windows to run the entrypoint of the container process.
          Defaults to the user specified in image metadata if unspecified.
          May also be set in PodSecurityContext. If set in both SecurityContext and
          PodSecurityContext, the value specified in SecurityContext takes precedence.
          +optional
        type: string
    type: object
info:
  contact: {}
  description: The vice-operator API for managing VICE analyses on remote clusters.
  title: vice-operator
  version: "1.0"
paths:
  /analyses:
    get:
      description: |-
        Returns all interactive (VICE) resources in the operator's namespace
        including deployments, pods, configmaps, services, and routes.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/reporting.ResourceInfo'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.ErrorResponse'
      security:
      - BasicAuth: []
      summary: List running VICE analyses
      tags:
      - analyses
    post:
      consumes:
      - application/json
      description: |-
        Receives a pre-built AnalysisBundle, transforms routing for
        this cluster, and applies all K8s resources. Returns 409 if at capacity.
      parameters:
      - description: The analysis bundle to launch
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/operatorclient.AnalysisBundle'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/common.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.ErrorResponse'
      security:
      - BasicAuth: []
      summary: Launch a VICE analysis
      tags:
      - analyses
  /analyses/{analysis-id}:
    delete:
      description: Deletes all K8s resources associated with an analysis.
      parameters:
      - description: The analysis ID
        in: path
        name: analysis-id
        required: true
        type: string
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.ErrorResponse'
      security:
      - BasicAuth: []
      summary: Exit (delete) a VICE analysis
      tags:
      - analyses
  /analyses/{analysis-id}/active-sessions:
    get:
      description: |-
        Returns the list of currently authenticated user sessions from
        the vice-proxy sidecar. Each entry includes the session ID and
        username. Use this to see who is logged in before calling
        POST /logout-user to remove a specific user.
      parameters:
      - description: The analysis ID
        in: path
        name: analysis-id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/operatorclient.ActiveSessionsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/common.ErrorResponse'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/common.ErrorResponse'
      security:
      - BasicAuth: []
      summary: List active sessions for an analysis
      tags:
      - analyses
  /analyses/{analysis-id}/download-input-files:
    post:
      description: |-
        Triggers the file-transfer sidecar to download input files
        for the analysis. Runs asynchronously.
      parameters:
      - description: The analysis ID
        in: path
        name: analysis-id
        required: true
        type: string
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.ErrorResponse'
      security:
      - BasicAuth: []
      summary: Download input files
      tags:
      - transfers
  /analyses/{analysis-id}/logout-user:
    post:
      consumes:
      - application/json
      description: |-
        Invalidates all active sessions for the given username in the
        vice-proxy sidecar. Use this to kick a specific user out of an
        analysis without needing their browser cookie or a Keycloak
        logout token. Does not trigger Keycloak SSO logout — the user
        remains logged in to other applications in the realm. Use
        GET /active-sessions first to see who is currently logged in.
      parameters:
      - description: The analysis ID
        in: path
        name: analysis-id
        required: true
        type: string
      - description: The user to log out
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/operatorclient.LogoutUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/operatorclient.LogoutUserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/common.ErrorResponse'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/common.ErrorResponse'
      security:
      - BasicAuth: []
      summary: Admin logout (by username, no cookie needed)
      tags:
      - analyses
  /analyses/{analysis-id}/logs:
    get:
      description: |-
        Returns container logs for pods belonging to the given analysis.
        Supports filtering by container, tail lines, and time.
      parameters:
      - description: The analysis ID
        in: path
        name: analysis-id
        required: true
        type: string
      - description: 'The container name (default: analysis)'
        in: query
        name: container
        type: string
      - description: Number of lines from the end
        in: query
        name: tail-lines
        type: integer
      - description: Seconds in the past
        in: query
        name: since
        type: integer
      - description: Epoch timestamp
        in: query
        name: since-time
        type: integer
      - description: Previously terminated container
        in: query
        name: previous
        type: boolean
      - description: Include timestamps
        in: query
        name: timestamps
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/reporting.VICELogEntry'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.ErrorResponse'
      security:
      - BasicAuth: []
      summary: Get analysis logs
      tags:
      - analyses
  /analyses/{analysis-id}/permissions:
    get:
      description: |-
        Returns the allowed-users list from the permissions ConfigMap
        for the given analysis.
      parameters:
      - description: The analysis ID
        in: path
        name: analysis-id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/operator.PermissionsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/common.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.ErrorResponse'
      security:
      - BasicAuth: []
      summary: Get analysis permissions
      tags:
      - analyses
    put:
      consumes:
      - application/json
      description: |-
        Replaces the allowed-users list in the permissions ConfigMap
        for the given analysis. The full list must be provided (not incremental).
      parameters:
      - description: The analysis ID
        in: path
        name: analysis-id
        required: true
        type: string
      - description: The new allowed users list
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/operator.UpdatePermissionsRequest'
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/common.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.ErrorResponse'
      security:
      - BasicAuth: []
      summary: Update analysis permissions
      tags:
      - analyses
  /analyses/{analysis-id}/pods:
    get:
      description: |-
        Returns pod name, phase, and readiness for all pods
        belonging to the given analysis.
      parameters:
      - description: The analysis ID
        in: path
        name: analysis-id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/operator.PodInfo'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.ErrorResponse'
      security:
      - BasicAuth: []
      summary: Get analysis pods
      tags:
      - analyses
  /analyses/{analysis-id}/save-and-exit:
    post:
      description: |-
        Triggers the file-transfer sidecar to upload output files,
        then deletes all K8s resources for the analysis. Runs asynchronously.
      parameters:
      - description: The analysis ID
        in: path
        name: analysis-id
        required: true
        type: string
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.ErrorResponse'
      security:
      - BasicAuth: []
      summary: Save outputs and exit
      tags:
      - transfers
  /analyses/{analysis-id}/save-output-files:
    post:
      description: |-
        Triggers the file-transfer sidecar to upload output files
        for the analysis. Runs asynchronously.
      parameters:
      - description: The analysis ID
        in: path
        name: analysis-id
        required: true
        type: string
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.ErrorResponse'
      security:
      - BasicAuth: []
      summary: Save output files
      tags:
      - transfers
  /analyses/{analysis-id}/status:
    get:
      description: |-
        Returns the status of all K8s resources (deployments, pods,
        services, routes) for the given analysis.
      parameters:
      - description: The analysis ID
        in: path
        name: analysis-id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/operator.StatusResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.ErrorResponse'
      security:
      - BasicAuth: []
      summary: Get analysis status
      tags:
      - analyses
  /analyses/{analysis-id}/swap-route:
    post:
      description: |-
        Swaps the HTTPRoute backend from the loading page service to
        the analysis Service. Idempotent.
      parameters:
      - description: The analysis ID
        in: path
        name: analysis-id
        required: true
        type: string
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.ErrorResponse'
      security:
      - BasicAuth: []
      summary: Manually swap route to analysis service
      tags:
      - analyses
  /analyses/{analysis-id}/url-ready:
    get:
      description: |-
        Returns whether the analysis has ready replicas, a service,
        and an HTTPRoute.
      parameters:
      - description: The analysis ID
        in: path
        name: analysis-id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/operator.URLReadyResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.ErrorResponse'
      security:
      - BasicAuth: []
      summary: Check if analysis URL is ready
      tags:
      - analyses
  /capacity:
    get:
      description: |-
        Returns the current cluster capacity including available slots,
        allocatable CPU/memory, and current usage.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/operatorclient.CapacityResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.ErrorResponse'
      security:
      - BasicAuth: []
      summary: Get cluster capacity
      tags:
      - capacity
  /image-cache:
    delete:
      consumes:
      - application/json
      description: |-
        Deletes the cache DaemonSets for the specified images.
        Non-existent images are silently ignored (idempotent).
        Note: some HTTP clients drop the body on DELETE requests.
        Use DELETE /image-cache/:id for single-image removal from browsers.
      parameters:
      - description: Images to remove
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/operator.ImageCacheRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/operator.ImageCacheBulkResponse'
        "207":
          description: Partial success
          schema:
            $ref: '#/definitions/operator.ImageCacheBulkResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.ErrorResponse'
      security:
      - BasicAuth: []
      summary: Remove cached images (bulk)
      tags:
      - image-cache
    get:
      description: Returns all image cache DaemonSets with their pull status.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/operator.ImageCacheListResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.ErrorResponse'
      security:
      - BasicAuth: []
      summary: List cached images
      tags:
      - image-cache
    put:
      consumes:
      - application/json
      description: |-
        Creates a DaemonSet per image to pre-pull it onto every node.
        Each DaemonSet uses an init container with the target image and
        a pause main container. For distroless/scratch images lacking
        "true", the init container will CrashLoopBackOff — this is expected
        and the image is still cached. Status will show "cached-with-errors".
      parameters:
      - description: Images to cache
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/operator.ImageCacheRequest'
      produces:
      - application/json
      responses:
        "200":
          description: All images cached successfully
          schema:
            $ref: '#/definitions/operator.ImageCacheBulkResponse'
        "207":
          description: Partial success
          schema:
            $ref: '#/definitions/operator.ImageCacheBulkResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.ErrorResponse'
      security:
      - BasicAuth: []
      summary: Cache container images
      tags:
      - image-cache
  /image-cache/{id}:
    delete:
      description: |-
        Deletes the cache DaemonSet for the image with the given slug ID.
        Returns success even if already absent (idempotent).
      parameters:
      - description: Image cache slug ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.ErrorResponse'
      security:
      - BasicAuth: []
      summary: Remove a cached image
      tags:
      - image-cache
    get:
      description: |-
        Returns the cache status for a single image by its slug ID
        (from the "id" field in list responses).
      parameters:
      - description: Image cache slug ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/operator.ImageCacheStatus'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/common.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.ErrorResponse'
      security:
      - BasicAuth: []
      summary: Get cached image status
      tags:
      - image-cache
  /image-cache/refresh:
    post:
      consumes:
      - application/json
      description: |-
        Restarts cache DaemonSet pods to force a fresh pull of images
        that may have been updated under the same tag. The DaemonSet
        init container uses PullAlways, so the restart causes containerd
        to fetch the latest manifest.
      parameters:
      - description: Images to refresh
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/operator.ImageCacheRequest'
      produces:
      - application/json
      responses:
        "200":
          description: All images refreshed
          schema:
            $ref: '#/definitions/operator.ImageCacheBulkResponse'
        "207":
          description: Partial success
          schema:
            $ref: '#/definitions/operator.ImageCacheBulkResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.ErrorResponse'
      security:
      - BasicAuth: []
      summary: Refresh cached images
      tags:
      - image-cache
  /regenerate-network-policies:
    post:
      description: |-
        Rebuilds egress NetworkPolicies for all running analyses to
        match the operator's current configuration.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/operator.RegenerateResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.ErrorResponse'
      security:
      - BasicAuth: []
      summary: Regenerate per-analysis network policies
      tags:
      - network-policies
securityDefinitions:
  BasicAuth:
    type: basic
swagger: "2.0"
